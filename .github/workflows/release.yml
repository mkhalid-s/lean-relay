name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1) Sanity: tag matches VERSION, and the code passes lint + pack. ─────
  #      We deliberately re-run the CI-equivalent checks in the release
  #      pipeline so a tag push can never publish an artifact that would fail
  #      CI on main.
  verify:
    name: Verify tag and lint
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tag matches VERSION file
        id: v
        run: |
          tag="${GITHUB_REF##refs/tags/}"
          version="$(head -n 1 VERSION | tr -d '[:space:]')"
          if [ "$tag" != "v$version" ]; then
            echo "Tag $tag does not match VERSION file (v$version)" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Lint
        run: |
          for f in install.sh bootstrap.sh get.sh bin/apx bin/apx-squeezr build/pack.sh build/header.sh; do
            bash -n "$f"
          done
          shellcheck --severity=warning \
            install.sh bootstrap.sh get.sh bin/apx bin/apx-squeezr build/pack.sh build/header.sh
          python -m py_compile bin/apx-gateway

  # ── 2) Build all artifacts: source tarball + self-extracting apx.sh ──────
  build:
    name: Build release artifacts
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build source tarball
        run: |
          version="${{ needs.verify.outputs.version }}"
          pkg="apx-${version}"
          mkdir -p "dist/${pkg}"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='state' \
            --exclude='bin/__pycache__' \
            --exclude='*.pyc' \
            --exclude='.smoke-home' \
            ./ "dist/${pkg}/"
          tar -C dist -czf "dist/${pkg}.tar.gz" "${pkg}"
          # Ubuntu runners have sha256sum by default; keep the whole workflow
          # consistent instead of mixing shasum/sha256sum.
          ( cd dist && sha256sum "${pkg}.tar.gz" > "${pkg}.tar.gz.sha256" )

      - name: Build self-extracting apx.sh installer
        run: |
          bash build/pack.sh
          embedded="$(bash dist/apx.sh --print-version)"
          expected="${{ needs.verify.outputs.version }}"
          if [ "$embedded" != "$expected" ]; then
            echo "apx.sh embedded version $embedded does not match tag v$expected" >&2
            exit 1
          fi
          ( cd dist && sha256sum -c apx.sh.sha256 )

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-artifacts
          path: |
            dist/apx.sh
            dist/apx.sh.sha256
            dist/get.sh
            dist/get.sh.sha256
            dist/apx-*.tar.gz
            dist/apx-*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30

  # ── 3) Defensive install smoke on both platforms before publishing ───────
  smoke:
    name: Release smoke (${{ matrix.os }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      FAKE_HOME: ${{ github.workspace }}/.smoke-home
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-artifacts
          path: dist

      - name: Verify checksum before install
        run: |
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum -c apx.sh.sha256
            sha256sum -c get.sh.sha256
            sha256sum -c apx-*.tar.gz.sha256
          else
            shasum -a 256 -c apx.sh.sha256
            shasum -a 256 -c get.sh.sha256
            shasum -a 256 -c apx-*.tar.gz.sha256
          fi
          tar -tzf apx-*.tar.gz | grep -q '/install.sh$'
          # get.sh must be present. Executable bit is stripped by
          # actions/upload-artifact so we only assert existence here; we
          # always invoke get.sh via `bash dist/get.sh` below.
          test -f get.sh

      - name: Verify get.sh round-trips against the previous release
        # Use the last published release (v0.2.0) to prove the bootstrap
        # mechanism works. The current tag isn't published yet, so we
        # cannot self-reference; the negative test below covers the
        # per-release checksum enforcement.
        run: |
          version=$(APX_VERSION=v0.2.0 bash dist/get.sh --print-version 2>/dev/null | tail -1)
          test "$version" = "0.2.0"

      - name: Verify get.sh refuses a checksum mismatch
        run: |
          stub_dir="$RUNNER_TEMP/curl-stub"
          rm -rf "$stub_dir"; mkdir -p "$stub_dir"
          cat > "$stub_dir/curl" <<'SH'
          #!/usr/bin/env bash
          out=""; while [ $# -gt 0 ]; do case "$1" in -o) out="$2"; shift 2 ;; *) shift ;; esac; done
          case "$out" in
            *apx.sh)         printf 'bogus\n' > "$out" ;;
            *apx.sh.sha256)  printf '%s  apx.sh\n' "$(printf 'expected\n' | sha256sum | awk '{print $1}')" > "$out" ;;
          esac
          exit 0
          SH
          chmod +x "$stub_dir/curl"
          set +e
          PATH="$stub_dir:$PATH" bash dist/get.sh --print-version >/dev/null 2>&1
          rc=$?
          set -e
          test "$rc" != 0

      - name: Install into isolated HOME (no service, skip deps)
        run: |
          rm -rf "$FAKE_HOME"
          mkdir -p "$FAKE_HOME"
          HOME="$FAKE_HOME" bash dist/apx.sh --no-service --skip-deps

      - name: Verify install layout
        run: |
          test -L "$FAKE_HOME/.local/bin/apx"
          test -L "$FAKE_HOME/.local/share/apx/current"
          test "$(cat "$FAKE_HOME/.config/apx/install.mode")" = "release"
          HOME="$FAKE_HOME" "$FAKE_HOME/.local/bin/apx" version
          HOME="$FAKE_HOME" "$FAKE_HOME/.local/bin/apx" versions

      - name: Smoke manifest-backed deps/cache purge
        run: |
          stub_dir="$RUNNER_TEMP/apx-stubs"
          rm -rf "$stub_dir"
          mkdir -p "$stub_dir" \
                   "$FAKE_HOME/.local/state/apx" \
                   "$FAKE_HOME/.local/pipx/venvs/headroom-ai" \
                   "$FAKE_HOME/Library/Caches/headroom/bin" \
                   "$FAKE_HOME/.npm/_npx/px/node_modules/pxpipe-proxy" \
                   "$FAKE_HOME/.npm/_npx/sq/node_modules/squeezr-ai" \
                   "$FAKE_HOME/.npm/_npx/keep/node_modules/other-package" \
                   "$FAKE_HOME/.npm/_cacache/content-v2/sha512/aa/bb" \
                   "$FAKE_HOME/.npm/_logs"
          touch "$FAKE_HOME/.npm/_cacache/content-v2/sha512/aa/bb/pxpipe"
          touch "$FAKE_HOME/.npm/_cacache/content-v2/sha512/aa/bb/squeezr"
          touch "$FAKE_HOME/.npm/_cacache/content-v2/sha512/aa/bb/other"
          echo keep > "$FAKE_HOME/.npm/keep"

          cat > "$stub_dir/pipx" <<'SH'
          #!/usr/bin/env bash
          echo "$*" >> "$HOME/pipx.log"
          if [ "${1:-}" = "uninstall" ] && [ "${2:-}" = "headroom-ai" ]; then
            rm -rf "$HOME/.local/pipx/venvs/headroom-ai"
          fi
          if [ "${1:-}" = "uninject" ] && [ "${2:-}" = "headroom-ai" ] && [ "${3:-}" = "ast-grep-cli" ]; then
            echo "uninject-ok" >> "$HOME/pipx.log"
          fi
          exit 0
          SH
          chmod +x "$stub_dir/pipx"

          cat > "$FAKE_HOME/.local/state/apx/install-manifest.env" <<EOF
          APX_INSTALL_MANIFEST_VERSION=1
          HEADROOM_AI_INSTALLED=1
          HEADROOM_TOOLS_CACHE_DIR=$FAKE_HOME/Library/Caches/headroom/bin
          NPM_CACHE_DIR=$FAKE_HOME/.npm
          NPM_WARMED_PXPIPE_PROXY=1
          NPM_WARMED_SQUEEZR_AI=1
          NPM_PXPIPE_PROXY_CACHE_PATH=$FAKE_HOME/.npm/_cacache/content-v2/sha512/aa/bb/pxpipe
          NPM_SQUEEZR_AI_CACHE_PATH=$FAKE_HOME/.npm/_cacache/content-v2/sha512/aa/bb/squeezr
          EOF

          APX_PATH="$stub_dir:$FAKE_HOME/.local/bin:/usr/bin:/bin:/opt/homebrew/bin:/usr/local/bin" \
            HOME="$FAKE_HOME" "$FAKE_HOME/.local/bin/apx" uninstall --purge=deps,caches --dry-run
          test -d "$FAKE_HOME/.local/pipx/venvs/headroom-ai"
          test ! -f "$FAKE_HOME/pipx.log"
          set +e
          APX_PATH="$stub_dir:$FAKE_HOME/.local/bin:/usr/bin:/bin:/opt/homebrew/bin:/usr/local/bin" \
            HOME="$FAKE_HOME" "$FAKE_HOME/.local/bin/apx" uninstall --purge=bogus --dry-run
          rc=$?
          set -e
          test "$rc" = 2

          # Uninject-only branch: apx injected ast-grep-cli into a user-owned
          # headroom-ai venv. --purge=deps must run 'pipx uninject' and MUST NOT
          # 'pipx uninstall' the whole venv.
          cat > "$FAKE_HOME/.local/state/apx/install-manifest.env" <<EOF
          APX_INSTALL_MANIFEST_VERSION=1
          AST_GREP_CLI_INJECTED=1
          EOF
          rm -f "$FAKE_HOME/pipx.log"
          APX_PATH="$stub_dir:$FAKE_HOME/.local/bin:/usr/bin:/bin:/opt/homebrew/bin:/usr/local/bin" \
            HOME="$FAKE_HOME" "$FAKE_HOME/.local/bin/apx" uninstall --purge=deps --yes
          grep -q "uninject headroom-ai ast-grep-cli" "$FAKE_HOME/pipx.log"
          ! grep -q "uninstall headroom-ai" "$FAKE_HOME/pipx.log"
          test -d "$FAKE_HOME/.local/pipx/venvs/headroom-ai"

          # Restore the full manifest for the real deletion pass.
          cat > "$FAKE_HOME/.local/state/apx/install-manifest.env" <<EOF
          APX_INSTALL_MANIFEST_VERSION=1
          HEADROOM_AI_INSTALLED=1
          HEADROOM_TOOLS_CACHE_DIR=$FAKE_HOME/Library/Caches/headroom/bin
          NPM_CACHE_DIR=$FAKE_HOME/.npm
          NPM_WARMED_PXPIPE_PROXY=1
          NPM_WARMED_SQUEEZR_AI=1
          NPM_PXPIPE_PROXY_CACHE_PATH=$FAKE_HOME/.npm/_cacache/content-v2/sha512/aa/bb/pxpipe
          NPM_SQUEEZR_AI_CACHE_PATH=$FAKE_HOME/.npm/_cacache/content-v2/sha512/aa/bb/squeezr
          EOF
          rm -f "$FAKE_HOME/pipx.log"
          APX_PATH="$stub_dir:$FAKE_HOME/.local/bin:/usr/bin:/bin:/opt/homebrew/bin:/usr/local/bin" \
            HOME="$FAKE_HOME" "$FAKE_HOME/.local/bin/apx" uninstall --purge=deps,caches --yes
          grep -q "uninstall headroom-ai" "$FAKE_HOME/pipx.log"
          ! grep -q "uninject headroom-ai" "$FAKE_HOME/pipx.log"
          test ! -d "$FAKE_HOME/.local/pipx/venvs/headroom-ai"
          test ! -d "$FAKE_HOME/Library/Caches/headroom/bin"
          test ! -d "$FAKE_HOME/.npm/_npx/px"
          test ! -d "$FAKE_HOME/.npm/_npx/sq"
          test -d "$FAKE_HOME/.npm/_npx/keep"
          test ! -f "$FAKE_HOME/.npm/_cacache/content-v2/sha512/aa/bb/pxpipe"
          test ! -f "$FAKE_HOME/.npm/_cacache/content-v2/sha512/aa/bb/squeezr"
          test -f "$FAKE_HOME/.npm/_cacache/content-v2/sha512/aa/bb/other"
          test -d "$FAKE_HOME/.npm/_logs"
          test -f "$FAKE_HOME/.npm/keep"
          test -L "$FAKE_HOME/.local/bin/apx"

          mkdir -p "$FAKE_HOME/.local/state/apx" "$FAKE_HOME/elsewhere/bin"
          rm -rf "$FAKE_HOME/Library/Caches/headroom"
          ln -s "$FAKE_HOME/elsewhere" "$FAKE_HOME/Library/Caches/headroom"
          cat > "$FAKE_HOME/.local/state/apx/install-manifest.env" <<EOF
          APX_INSTALL_MANIFEST_VERSION=1
          HEADROOM_TOOLS_CACHE_DIR=$FAKE_HOME/Library/Caches/headroom/bin
          EOF
          if APX_PATH="$stub_dir:$FAKE_HOME/.local/bin:/usr/bin:/bin:/opt/homebrew/bin:/usr/local/bin" \
            HOME="$FAKE_HOME" "$FAKE_HOME/.local/bin/apx" uninstall --purge=caches --yes; then
            echo "symlinked cache path unexpectedly succeeded" >&2
            exit 1
          fi
          test -d "$FAKE_HOME/elsewhere/bin"

      - name: Uninstall --purge leaves no residue
        run: |
          mkdir -p "$FAKE_HOME/apx-src/.git"
          echo "$FAKE_HOME/apx-src" > "$FAKE_HOME/.config/apx/source.path"
          HOME="$FAKE_HOME" "$FAKE_HOME/.local/bin/apx" uninstall --purge --yes
          test ! -e "$FAKE_HOME/.local/bin/apx"
          test ! -d "$FAKE_HOME/.local/share/apx/versions"
          test -d "$FAKE_HOME/apx-src/.git"

      - name: Plain purge refuses to delete a recorded source clone inside apx roots
        run: |
          rm -rf "$FAKE_HOME"
          mkdir -p "$FAKE_HOME/.config/apx" "$FAKE_HOME/.local/share/apx/src/.git" "$FAKE_HOME/.local/bin"
          # Extract the CLI from the built tarball so we exercise the release copy.
          tar -tzf dist/apx-*.tar.gz | head -3
          tarball="$(ls dist/apx-*.tar.gz | head -1)"
          extract_dir="$RUNNER_TEMP/apx-extract"
          rm -rf "$extract_dir"; mkdir -p "$extract_dir"
          tar -xzf "$tarball" -C "$extract_dir"
          apx_src="$(find "$extract_dir" -type f -name apx -path '*/bin/apx' | head -1)"
          cp "$apx_src" "$FAKE_HOME/.local/bin-apx"
          chmod +x "$FAKE_HOME/.local/bin-apx"
          echo "$FAKE_HOME/.local/share/apx/src" > "$FAKE_HOME/.config/apx/source.path"
          set +e
          HOME="$FAKE_HOME" "$FAKE_HOME/.local/bin-apx" uninstall --purge --yes
          rc=$?
          set -e
          test "$rc" != 0
          test -d "$FAKE_HOME/.local/share/apx/src/.git"

      - name: Non-default APX_SHARE/APX_STATE/APX_CONFIG is refused by --purge
        run: |
          rm -rf "$FAKE_HOME"
          mkdir -p "$FAKE_HOME/Documents/precious" "$FAKE_HOME/.config/apx" "$FAKE_HOME/.local"
          touch "$FAKE_HOME/Documents/precious/keep.txt"
          tarball="$(ls dist/apx-*.tar.gz | head -1)"
          extract_dir="$RUNNER_TEMP/apx-extract-env"
          rm -rf "$extract_dir"; mkdir -p "$extract_dir"
          tar -xzf "$tarball" -C "$extract_dir"
          apx_src="$(find "$extract_dir" -type f -name apx -path '*/bin/apx' | head -1)"
          cp "$apx_src" "$FAKE_HOME/.local/bin-apx"
          chmod +x "$FAKE_HOME/.local/bin-apx"
          set +e
          HOME="$FAKE_HOME" APX_SHARE="$FAKE_HOME/Documents/precious" \
            "$FAKE_HOME/.local/bin-apx" uninstall --purge=share --yes
          rc=$?
          set -e
          test "$rc" = 2
          test -f "$FAKE_HOME/Documents/precious/keep.txt"

  # ── 4) Publish the GitHub Release only after every check passes. ─────────
  publish:
    name: Publish GitHub Release
    needs: [build, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-artifacts
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/apx.sh
            dist/apx.sh.sha256
            dist/get.sh
            dist/get.sh.sha256
            dist/apx-*.tar.gz
            dist/apx-*.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
