name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches VERSION file
        run: |
          tag="${GITHUB_REF##refs/tags/}"
          version="v$(head -n 1 VERSION | tr -d '[:space:]')"
          if [ "$tag" != "$version" ]; then
            echo "Tag $tag does not match VERSION file ($version)" >&2
            exit 1
          fi

      - name: Build release tarball
        run: |
          version="$(head -n 1 VERSION | tr -d '[:space:]')"
          pkg="apx-${version}"
          mkdir -p "dist/${pkg}"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='state' \
            --exclude='bin/__pycache__' \
            --exclude='*.pyc' \
            ./ "dist/${pkg}/"
          tar -C dist -czf "dist/${pkg}.tar.gz" "${pkg}"
          ( cd dist && shasum -a 256 "${pkg}.tar.gz" > "${pkg}.tar.gz.sha256" )

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
